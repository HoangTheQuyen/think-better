name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod

            - name: Prepare embedded skills
              run: make embed-prep

            - name: Build
              run: make build

            - name: Test
              run: make test

            - name: Verify binary
              run: ./bin/think-better version
